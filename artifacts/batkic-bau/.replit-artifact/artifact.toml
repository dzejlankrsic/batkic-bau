kind = "web"
previewPath = "/"
title = "BATKIC BAU GmbH"
version = "1.0.0"
id = "artifacts/batkic-bau"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19042
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/batkic-bau run dev"

[services.env]
PORT = "19042"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/batkic-bau", "run", "build"]
publicDir = "artifacts/batkic-bau/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
