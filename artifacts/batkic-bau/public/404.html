<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>BATKIC BAU GmbH</title>
    <script>
      // SPA redirect for GitHub Pages
      // Encodes the requested path into the query string so index.html can restore it
      var segmentCount = 1; // equals the number of path segments in BASE_PATH (/batkic-bau/ = 1)
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + segmentCount)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(segmentCount)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search
            ? "&" + l.search.slice(1).replace(/&/g, "~and~")
            : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
